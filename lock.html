<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>系统锁定</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --border: #1a1a1a;
      --accent-bg: #f2f2f2;
      --btn-primary: #1a1a1a;
      --btn-primary-text: #ffffff;
      --muted: #666666;
      --error: #ff3e3e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --text: #eeeeee;
        --border: #444444;
        --accent-bg: #1e1e1e;
        --btn-primary: #eeeeee;
        --btn-primary-text: #121212;
        --muted: #888888;
      }
    }

    @font-face {
      font-family: 'sarasa';
      src: url('/font.woff');
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'sarasa';
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }

    .header {
      border-bottom: 4px solid var(--border);
      margin-bottom: 30px;
      padding-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .status-box {
      border: 2px solid var(--border);
      background: var(--accent-bg);
      padding: 30px 20px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    .status-box::before {
      content: "LOCKED";
      position: absolute;
      font-size: 80px;
      font-weight: 900;
      opacity: 0.05;
      bottom: -20px;
      right: -10px;
      pointer-events: none;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 15px;
      display: block;
    }

    .label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .message {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 900;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    input { 
      width: 100%; padding: 10px; margin-bottom: 10px;
      border: 2px solid currentColor; background: transparent; color: inherit;
      font-family: inherit; box-sizing: border-box; outline: none;
    }

    .error-msg {
      color: var(--error);
      font-size: 11px;
      font-weight: 900;
      margin-top: 6px;
      display: none;
      text-transform: uppercase;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-direction: column;
    }

    .btn {
      width: 100%;
      padding: 15px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--btn-primary);
      color: var(--btn-primary-text);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:active {
      transform: translate(2px, 2px);
    }

    .btn-cancel {
      background: var(--accent-bg);
      color: var(--text);
    }

    .button-group-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-group-row .btn {
      width: 100%;
    }

    .loading {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26, 26, 26, 0.3);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @media (prefers-color-scheme: dark) {
      .loading {
        border: 2px solid rgba(238, 238, 238, 0.3);
        border-top-color: var(--text);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 40px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hide {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>错误</h1>
    </div>

    <div class="status-box">
      <span class="icon">⚠</span>
      <div class="message">应用上次未正常退出，需要验证身份</div>
      <span class="label">恢复后将会关闭应用，重启即可使用</span>
    </div>

    <form id="lock-form">
      <div class="form-group">
        <label class="form-label">管理员密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
        <div id="password-error" class="error-msg"></div>
      </div>

      <div class="button-group-row">
        <button type="submit" class="btn" id="btn-confirm">
          <span id="confirm-text">确认</span>
        </button>
        <button type="button" class="btn btn-cancel" id="btn-cancel">清空</button>
      </div>
    </form>

    <div class="footer">
      Github@ArthurZhou
    </div>
  </div>

  <script type="module">
    import { invoke } from "@tauri-apps/api/core";

    const form = document.getElementById('lock-form');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('password-error');
    const confirmBtn = document.getElementById('btn-confirm');
    const cancelBtn = document.getElementById('btn-cancel');
    const confirmText = document.getElementById('confirm-text');

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = passwordInput.value;

        if (!password) {
          errorDiv.textContent = '请输入密码';
          errorDiv.style.display = 'block';
          return;
        }

        confirmBtn.disabled = true;
        errorDiv.style.display = 'none';

        try {
          const result = await invoke('verify_and_reset_state', { password });
          console.log('验证结果:', result);
          if (result) {
            console.log('验证成功，系统状态已恢复');
            await new Promise(resolve => setTimeout(resolve, 300));
            try {
              await invoke('launch_main_window');
              console.log('主窗口已启动');
              await new Promise(resolve => setTimeout(resolve, 200));
              window.close?.();
            } catch (err) {
              console.error('启动主窗口失败:', err);
              errorDiv.textContent = '!启动失败，请重试';
              errorDiv.style.display = 'block';
            }
          } else {
            errorDiv.textContent = '密码错误，请重试';
            errorDiv.style.display = 'block';
            passwordInput.value = '';
            passwordInput.focus();
          }
        } catch (e) {
          console.error('验证出错:', e);
          errorDiv.textContent = `错误: ${e}`;
          errorDiv.style.display = 'block';
          passwordInput.value = '';
          passwordInput.focus();
        } finally {
          confirmBtn.disabled = false;
        }
      });
    }

    if (cancelBtn) {
      cancelBtn.addEventListener('click', () => {
        passwordInput.value = '';
        errorDiv.style.display = 'none';
        passwordInput.focus();
      });
    }

    passwordInput?.focus();
  </script>
</body>

</html>
</body>
</html>
